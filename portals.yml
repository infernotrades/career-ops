# Portal Scanner Configuration — Daniel King
# Tailored for crypto/AI/tech + operations + business roles

title_filter:
  positive:
    # -- AI / Automation --
    - "AI"
    - "Automation"
    - "n8n"
    - "Workflow"
    - "Bot"
    - "LLM"
    - "Agentic"
    - "Hyperautomation"
    # -- Crypto / Blockchain --
    - "Crypto"
    - "Blockchain"
    - "DeFi"
    - "Web3"
    - "Solana"
    - "Bitcoin"
    - "Exchange"
    - "DAO"
    # -- Operations / Executive --
    - "Operations"
    - "Operator"
    - "Executive"
    - "Founder"
    - "COO"
    - "Director"
    - "VP"
    - "Chief"
    - "Manager"
    - "Business"
    - "Consulting"
    # -- Marketing / Design --
    - "Marketing"
    - "Brand"
    - "Growth"
    - "Graphic"
    - "Design"
    # -- Sales / BD --
    - "Sales"
    - "Business Development"
    - "Partnership"
    - "Account"
    # -- Project / Program --
    - "Project Manager"
    - "Program"
    - "Coordinator"
  negative:
    - "Junior"
    - "Intern"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Mainframe"
    - "COBOL"
    - "SAP "
    - "Oracle EBS"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "VP"
    - "Chief"
    - "Executive"

search_queries:
  # -- Crypto / AI --
  - name: Crypto — Operations
    query: '"operations" OR "COO" OR "executive" crypto OR blockchain OR DeFi OR web3 remote'
    enabled: true

  - name: Crypto — AI/Automation
    query: 'AI automation blockchain OR crypto OR web3 OR "smart contract" remote senior'
    enabled: true

  - name: Crypto — Business Development
    query: '"business development" OR "partnership" OR "sales" crypto OR blockchain remote'
    enabled: true

  # -- AI / Automation --
  - name: Ashby — AI Automation
    query: 'site:jobs.ashbyhq.com automation OR "AI" OR "workflow" OR "n8n" remote'
    enabled: true

  - name: Greenhouse — AI Automation
    query: 'site:job-boards.greenhouse.io automation OR "AI operations" OR "AI consultant" remote'
    enabled: true

  - name: Wellfound — Startup Roles
    query: 'site:wellfound.com operations OR "founder" OR "AI" OR automation remote'
    enabled: true

  - name: Indeed — AI/Automation
    query: 'site:indeed.com "AI automation" OR "workflow automation" OR "n8n" OR "bot developer" remote'
    enabled: true

  # -- Operations / Executive --
  - name: Executive — Operations
    query: '"operations manager" OR "COO" OR "director of operations" AI OR tech OR crypto remote'
    enabled: true

  - name: Executive — Consulting
    query: '"business consultant" OR "AI consultant" OR "automation consultant" remote senior'
    enabled: true

  # -- Design / Marketing --
  - name: Design — Brand/Graphic
    query: '"graphic designer" OR "brand designer" OR "marketing designer" AI crypto remote'
    enabled: true

  - name: Marketing — Growth
    query: '"growth manager" OR "marketing operations" OR "content" AI crypto remote senior'
    enabled: true

